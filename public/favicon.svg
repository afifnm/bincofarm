<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Banknote body -->
  <rect x="7" y="20" width="50" height="24" rx="5" fill="white" opacity="0.95"/>

  <!-- Left security strip -->
  <rect x="7" y="20" width="7" height="24" rx="5" fill="#d1fae5" opacity="0.8"/>
  <rect x="50" y="20" width="7" height="24" rx="5" fill="#d1fae5" opacity="0.8"/>

  <!-- Center coin -->
  <circle cx="32" cy="32" r="9" fill="url(#coin)"/>
  <circle cx="32" cy="32" r="7" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>

  <!-- Rp symbol on coin -->
  <text x="32" y="36.5" text-anchor="middle" fill="white"
        font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="10"
        letter-spacing="-0.5">Rp</text>

  <!-- Small dot details left/right -->
  <circle cx="19" cy="32" r="2.5" fill="#a7f3d0" opacity="0.7"/>
  <circle cx="45" cy="32" r="2.5" fill="#a7f3d0" opacity="0.7"/>
</svg>
